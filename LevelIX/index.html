<!DOCTYPE html>
<html>
<head>
<title>Level IX</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

* {
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cinzel',serif;
overflow:hidden;
}

.hero-section {
position:relative;
height:100vh;
width:100%;
background:linear-gradient(rgba(5,5,5,0.6), rgba(5,5,5,0.6)), 
            url('https://images.unsplash.com/photo-1703939773649-f3f92533419e?w=1400&q=80') no-repeat center/cover;
display:flex;
align-items:center;
justify-content:center;
color:#ffffff;
overflow:hidden;
}

.hero-overlay {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(5,5,5,0.4);
display:flex;
align-items:center;
justify-content:center;
z-index:1;
}

.hero-overlay::after {
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:radial-gradient(circle at 50% 50%, rgba(100,200,255,0.08) 0%, transparent 60%);
pointer-events:none;
}

.hero-content {
text-align:center;
z-index:2;
position:relative;
animation:fadeInUp 1.2s ease-out;
}

@keyframes fadeInUp {
from {
opacity:0;
transform:translateY(30px);
}
to {
opacity:1;
transform:translateY(0);
}
}

.hero-title {
font-size:85px;
letter-spacing:8px;
font-weight:600;
margin-bottom:15px;
color:#e0e0e0;
text-shadow:0 2px 20px rgba(100,200,255,0.3);
}

.hero-subtitle {
font-size:18px;
text-transform:uppercase;
letter-spacing:2px;
margin-bottom:50px;
opacity:0.85;
color:#b0b0b0;
text-shadow:0 1px 10px rgba(0,0,0,0.5);
}

.button-group {
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
}

.hero-btn {
padding:16px 40px;
border:1.5px solid #c0c0c0;
color:#c0c0c0;
text-decoration:none;
text-transform:uppercase;
letter-spacing:2px;
font-family:'Cinzel',serif;
font-size:14px;
transition:all 0.4s ease;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(5px);
cursor:pointer;
position:relative;
display:inline-block;
}

.hero-btn::before {
content:'';
position:absolute;
inset:0;
background:linear-gradient(45deg, rgba(100,200,255,0.1), transparent);
opacity:0;
transition:opacity 0.4s ease;
}

.hero-btn:hover {
background:#c0c0c0;
color:#050505;
box-shadow:0 0 25px rgba(100,200,255,0.4);
transform:translateY(-2px);
border-color:#e0e0e0;
}

.hero-btn:hover::before {
opacity:1;
}

</style>
</head>

<body>

<header class="hero-section">
<div class="hero-overlay">
<div class="hero-content">
<h1 class="hero-title">LEVEL IX</h1>
<p class="hero-subtitle">Elite Placement for Exceptional Presence</p>
<div class="button-group">
<a href="pages/gallery.html" class="hero-btn">Enter Gallery</a>
<a href="#create" class="hero-btn">Create Your Presence</a>
</div>
</div>
</div>
</header>

</body>
</html>
